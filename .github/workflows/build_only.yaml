name: Build Feature Branch
# Run when a normal branch updates: Build only

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '.github/**'

  pull_request:
    branches:
      - main
      - develop
      - staging
      - 'release/**'
    types: [opened, synchronize, reopened]


permissions:
  contents: read

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        id: push
        run: echo "Hi"