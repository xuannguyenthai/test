name: Manual Deploy With Git Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy. It must be of the format like 2026.2.1-abc1234 and created from main branch."
        required: true
        type: string
      environment:
        description: "staging (default), prod"
        required: true
        type: choice
        options:
          - staging
          - prod
        default: staging
      reason:
        description: "Reason for deploying the tag"
        required: true
        type: string

jobs:
  detect-environment:
    name: Detect Environment
    runs-on: ubuntu-latest
    steps:
      - id: set-env
        run: |
          echo "Hi"