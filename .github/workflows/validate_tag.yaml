name: Check Tag-Image Match

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*-*"
      - "v**"

permissions:
  contents: read
  id-token: write


jobs:
  resolve:
    name: Resolve image for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment: prod

    outputs:
      image_uri: ${{ steps.resolve.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "Tag ${{ github.ref_name }} does not point to a commit in main's history."
            echo "Tags must be created from main."
            exit 1
          fi
          echo "Tag is on main"

